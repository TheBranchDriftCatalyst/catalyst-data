---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-knowledge-init
  labels:
    app: postgres-knowledge
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;

    CREATE TABLE IF NOT EXISTS canonical_entities (
        canonical_id TEXT PRIMARY KEY,
        canonical_name TEXT NOT NULL,
        entity_type TEXT NOT NULL,
        aliases TEXT[] DEFAULT '{}',
        external_ids JSONB DEFAULT '{}',
        embedding vector(1536),
        mention_count INTEGER DEFAULT 0,
        first_seen TIMESTAMPTZ DEFAULT NOW(),
        last_seen TIMESTAMPTZ DEFAULT NOW(),
        created_at TIMESTAMPTZ DEFAULT NOW(),
        updated_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS alignment_edges (
        edge_id TEXT PRIMARY KEY,
        source_entity_id TEXT NOT NULL REFERENCES canonical_entities(canonical_id),
        target_entity_id TEXT NOT NULL REFERENCES canonical_entities(canonical_id),
        alignment_type TEXT NOT NULL,
        score REAL NOT NULL,
        evidence JSONB DEFAULT '[]',
        method TEXT DEFAULT '',
        created_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS assertions (
        assertion_id TEXT PRIMARY KEY,
        subject_canonical_id TEXT REFERENCES canonical_entities(canonical_id),
        predicate TEXT NOT NULL,
        predicate_canonical TEXT DEFAULT '',
        object_canonical_id TEXT REFERENCES canonical_entities(canonical_id),
        qualifiers JSONB DEFAULT '{}',
        confidence REAL DEFAULT 1.0,
        negated BOOLEAN DEFAULT FALSE,
        hedged BOOLEAN DEFAULT FALSE,
        source_document_id TEXT,
        chunk_id TEXT,
        code_location TEXT DEFAULT '',
        created_at TIMESTAMPTZ DEFAULT NOW()
    );

    -- Indexes
    CREATE INDEX IF NOT EXISTS idx_entities_name ON canonical_entities USING gin (canonical_name gin_trgm_ops);
    CREATE INDEX IF NOT EXISTS idx_entities_type ON canonical_entities (entity_type);
    CREATE INDEX IF NOT EXISTS idx_entities_embedding ON canonical_entities USING ivfflat (embedding vector_cosine_ops) WITH (lists = 100);

    CREATE INDEX IF NOT EXISTS idx_align_source ON alignment_edges (source_entity_id);
    CREATE INDEX IF NOT EXISTS idx_align_target ON alignment_edges (target_entity_id);
    CREATE INDEX IF NOT EXISTS idx_align_type ON alignment_edges (alignment_type);

    CREATE INDEX IF NOT EXISTS idx_assert_subject ON assertions (subject_canonical_id);
    CREATE INDEX IF NOT EXISTS idx_assert_object ON assertions (object_canonical_id);
    CREATE INDEX IF NOT EXISTS idx_assert_predicate ON assertions (predicate_canonical);
    CREATE INDEX IF NOT EXISTS idx_assert_code_location ON assertions (code_location);
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-knowledge
  labels:
    app: postgres-knowledge
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-knowledge
  labels:
    app: postgres-knowledge
    app.kubernetes.io/name: postgres-knowledge
    app.kubernetes.io/part-of: catalyst-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-knowledge
  template:
    metadata:
      labels:
        app: postgres-knowledge
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: knowledge_graph
            - name: POSTGRES_USER
              value: kg
            - name: POSTGRES_PASSWORD
              value: kg-homelab
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-knowledge
        - name: init
          configMap:
            name: postgres-knowledge-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-knowledge
  labels:
    app: postgres-knowledge
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgres-knowledge
