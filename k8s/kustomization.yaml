---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: catalyst-data

resources:
  # Namespace
  - namespace.yaml
  # Secrets (consolidated — one set for entire namespace)
  - secrets/externalsecret-s3.yaml
  - secrets/externalsecret-congress.yaml
  - secrets/externalsecret-llm.yaml
  # Storage
  - storage/nfs-media-volumes.yaml
  # Platform (webserver, daemon, postgres)
  - platform/rbac.yaml
  - platform/pvc.yaml
  - platform/postgres.yaml
  - platform/dagster-instance.yaml
  - platform/workspace.yaml
  - platform/deployment.yaml
  - platform/service.yaml
  - platform/ingressroute.yaml
  # Knowledge graph infrastructure
  - platform/postgres-knowledge.yaml
  - platform/neo4j.yaml
  # Code locations
  - congress-data/deployment.yaml
  - congress-data/service.yaml
  - media-ingest/deployment.yaml
  - media-ingest/service.yaml
  - open-leaks/deployment.yaml
  - open-leaks/service.yaml
  - knowledge-graph/deployment.yaml
  - knowledge-graph/service.yaml
  # Data Explorer (Streamlit UI)
  - data-explorer/deployment.yaml
  - data-explorer/service.yaml
  - data-explorer/ingressroute.yaml
  # Monitoring (ServiceMonitor, PrometheusRule, Grafana Dashboard)
  - monitoring/servicemonitor.yaml
  - monitoring/prometheusrule.yaml
  - monitoring/grafana-dashboard.yaml

configMapGenerator:
  - name: shared-prompts
    files:
      - ner-basic.prompt=../libs/dagster-io/prompts/ner/basic.prompt
      - propositions-spo.prompt=../libs/dagster-io/prompts/propositions/spo.prompt
  - name: open-leaks-prompts
    files:
      - mentions.prompt=../packages/open-leaks/prompts/mentions.prompt
      - assertions.prompt=../packages/open-leaks/prompts/assertions.prompt
  - name: congress-data-prompts
    files:
      - mentions.prompt=../packages/congress-data/prompts/mentions.prompt
      - assertions.prompt=../packages/congress-data/prompts/assertions.prompt
  - name: data-explorer-prompts
    files:
      - rag-research-assistant.prompt=../packages/data-explorer/prompts/rag-research-assistant.prompt
