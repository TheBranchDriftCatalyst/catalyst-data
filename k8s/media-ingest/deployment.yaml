---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-ingest
  labels:
    app: media-ingest
    app.kubernetes.io/name: media-ingest
    app.kubernetes.io/part-of: catalyst-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-ingest
  template:
    metadata:
      labels:
        app: media-ingest
        app.kubernetes.io/name: media-ingest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: code-server
          image: ghcr.io/thebranchdriftcatalyst/media-ingest:latest
          ports:
            - name: grpc
              containerPort: 4000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "catalyst-data.media-ingest"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=catalyst-data,deployment.environment=production"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LOG_FORMAT
              value: "json"
            - name: METRICS_PORT
              value: "9090"
            - name: DAGSTER_CURRENT_IMAGE
              value: ghcr.io/thebranchdriftcatalyst/media-ingest:latest
            - name: DAGSTER_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: dagster-s3-credentials
                  key: DAGSTER_S3_ENDPOINT_URL
            - name: DAGSTER_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dagster-s3-credentials
                  key: DAGSTER_S3_ACCESS_KEY
            - name: DAGSTER_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dagster-s3-credentials
                  key: DAGSTER_S3_SECRET_KEY
            - name: DAGSTER_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: dagster-s3-credentials
                  key: DAGSTER_S3_BUCKET
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
            - name: LLM_BASE_URL
              value: http://litellm.catalyst-llm.svc.cluster.local:4000/v1
            - name: EMBEDDING_BASE_URL
              value: http://litellm.catalyst-llm.svc.cluster.local:4000/v1
          volumeMounts:
            - name: metube-downloads
              mountPath: /data/metube
              readOnly: true
            - name: tubesync-downloads
              mountPath: /data/tubesync
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: metube-downloads
          persistentVolumeClaim:
            claimName: metube-downloads
        - name: tubesync-downloads
          persistentVolumeClaim:
            claimName: tubesync-downloads
