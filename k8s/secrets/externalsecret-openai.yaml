---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: open-leaks-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: open-leaks-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: open-leaks-secrets
        property: OPENAI_API_KEY
