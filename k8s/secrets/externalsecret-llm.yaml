---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: llm-credentials
    creationPolicy: Owner
  data:
    - secretKey: LLM_API_KEY
      remoteRef:
        key: litellm
        property: master-key
