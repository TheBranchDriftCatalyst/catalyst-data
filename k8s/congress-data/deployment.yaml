---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: congress-data
  labels:
    app: congress-data
    app.kubernetes.io/name: congress-data
    app.kubernetes.io/part-of: catalyst-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: congress-data
  template:
    metadata:
      labels:
        app: congress-data
        app.kubernetes.io/name: congress-data
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: code-server
          image: ghcr.io/thebranchdriftcatalyst/congress-data:latest
          ports:
            - name: grpc
              containerPort: 4000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "catalyst-data.congress-data"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=catalyst-data,deployment.environment=production"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LOG_FORMAT
              value: "json"
            - name: METRICS_PORT
              value: "9090"
            - name: CONGRESS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: congress-data-secrets
                  key: CONGRESS_API_KEY
            - name: DAGSTER_CURRENT_IMAGE
              value: ghcr.io/thebranchdriftcatalyst/congress-data:latest
            - name: DAGSTER_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: dagster-s3-credentials
                  key: DAGSTER_S3_ENDPOINT_URL
            - name: DAGSTER_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dagster-s3-credentials
                  key: DAGSTER_S3_ACCESS_KEY
            - name: DAGSTER_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dagster-s3-credentials
                  key: DAGSTER_S3_SECRET_KEY
            - name: DAGSTER_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: dagster-s3-credentials
                  key: DAGSTER_S3_BUCKET
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
            - name: LLM_BASE_URL
              value: http://litellm.catalyst-llm.svc.cluster.local:4000/v1
            - name: EMBEDDING_BASE_URL
              value: http://litellm.catalyst-llm.svc.cluster.local:4000/v1
            - name: PROMPT_REGISTRY_DIR
              value: /app/prompts
          volumeMounts:
            - name: prompts
              mountPath: /app/prompts
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: prompts
          projected:
            sources:
              - configMap:
                  name: shared-prompts
                  items:
                    - key: ner-basic.prompt
                      path: ner/basic.prompt
                    - key: propositions-spo.prompt
                      path: propositions/spo.prompt
              - configMap:
                  name: congress-data-prompts
                  items:
                    - key: mentions.prompt
                      path: mentions/congress.prompt
                    - key: assertions.prompt
                      path: assertions/congress.prompt
