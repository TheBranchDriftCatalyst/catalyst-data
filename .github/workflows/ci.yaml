name: Catalyst Data CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e libs/dagster-io
          pip install -e packages/congress-data
          pip install -e packages/media-ingest
          pip install -e packages/open-leaks
          pip install -e packages/knowledge-graph
          pip install -e packages/data-explorer
          pip install pytest pytest-cov
      - run: pytest --tb=short

  build:
    needs: test
    strategy:
      matrix:
        app: [congress-data, media-ingest, open-leaks, knowledge-graph, data-explorer]
    uses: ./.github/workflows/build-image.yaml
    with:
      app: ${{ matrix.app }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
