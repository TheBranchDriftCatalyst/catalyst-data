[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "knowledge-graph"
version = "0.1.0"
description = "Knowledge graph platinum layer — cross-source entity resolution and assertion graph"
requires-python = ">=3.12"
dependencies = [
    "dagster>=1.9",
    "dagster-k8s>=0.25",
    "dagster-postgres>=0.25",
    "dagster-io",
    "pydantic>=2.0",
    "neo4j>=5.0",
    "psycopg[binary]>=3.1",
]

[project.optional-dependencies]
dev = [
    "dagster-webserver>=1.9",
    "pytest>=8.0",
    "ruff>=0.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/knowledge_graph"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
